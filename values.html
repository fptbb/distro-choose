<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DistroChoose - All Values</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg" href="icon.svg">
</head>

<body>
    <div class="main-container">
        <a href="index.html" class="home-link" title="Return to Home"><h1>All Values</h1></a>
        <p class="intro-text">Below is a collection of all preference values used in DistroChoose. Click on any item to
            view its description.</p>
        <div id="values-container"></div>
        <div id="buttons" style="margin-top: 40px; padding-bottom: 60px;">
            <button onclick="location.href='index.html'">Back</button>
        </div>
    </div>

    <script src="data/data.js"></script>

    <script>
        const container = document.getElementById('values-container');

        for (const category in resultsMapping) {
            const section = document.createElement('div');
            section.className = 'category-section';

            const title = document.createElement('h2');
            title.className = 'category-title';
            title.innerText = categoryTitles[category] || category;

            section.appendChild(title);

            const flexContainer = document.createElement('div');
            flexContainer.className = 'values-flex-container';

            for (const id in resultsMapping[category]) {
                const wrapper = document.createElement('a');
                wrapper.className = 'result-item';
                wrapper.href = `description.html?id=${id}&cat=${category}`;
                wrapper.style.textDecoration = 'none';
                wrapper.style.color = 'inherit';

                const img = document.createElement('img');
                img.src = `icons/${category}/${id}.svg`;
                img.className = 'result-icon';
                img.alt = resultsMapping[category][id];
                img.onerror = function () {
                    this.style.display = 'none';
                };

                const name = document.createElement('p');
                name.innerText = resultsMapping[category][id];
                name.className = 'result-text';

                wrapper.appendChild(img);
                wrapper.appendChild(name);
                flexContainer.appendChild(wrapper);
            }

            section.appendChild(flexContainer);
            container.appendChild(section);
        }
    </script>
</body>

</html>
